<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Not Found | {{ bot_name }}</title>
  <link rel="icon" type="image/jpeg" href="https://i.ibb.co/2YsHg8tf/IMG-3062.jpg">
  <link rel="shortcut icon" type="image/jpeg" href="https://i.ibb.co/2YsHg8tf/IMG-3062.jpg">
  <link rel="apple-touch-icon" href="https://i.ibb.co/2YsHg8tf/IMG-3062.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ── CSS Custom Properties ──────────────────────────────── */
    :root,
    [data-theme="dark"] {
      --bg-base:             #0f0c29;
      --bg-gradient:         linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      --card-bg:             rgba(255,255,255,0.06);
      --card-border:         rgba(255,255,255,.13);
      --card-shadow:         0 24px 64px rgba(0,0,0,.4);
      --text-primary:        #ffffff;
      --text-secondary:      rgba(255,255,255,.55);
      --text-muted:          rgba(255,255,255,.38);
      --chip-bg:             rgba(255,255,255,.08);
      --chip-border:         rgba(255,255,255,.14);
      --chip-color:          rgba(255,255,255,.65);
      --btn-outline-bg:      rgba(255,255,255,.09);
      --btn-outline-border:  rgba(255,255,255,.2);
      --btn-outline-color:   rgba(255,255,255,.78);
      --btn-outline-hover:   rgba(255,255,255,.15);
      --particle-color:      rgba(160,140,255,0.18);
      --particle-color2:     rgba(102,126,234,0.14);
      --footer-link:         rgba(255,215,0,.8);
      --footer-hover:        #ffd700;
      --toggle-bg:           rgba(255,255,255,.08);
      --toggle-border:       rgba(255,255,255,.18);
      --toggle-color:        rgba(255,255,255,.8);
    }

    [data-theme="light"] {
      --bg-base:             #eef0fb;
      --bg-gradient:         linear-gradient(135deg, #e8eaf6 0%, #ede7f6 50%, #e3e8f0 100%);
      --card-bg:             rgba(255,255,255,.92);
      --card-border:         rgba(102,126,234,.2);
      --card-shadow:         0 24px 64px rgba(102,126,234,.14);
      --text-primary:        #1a1a2e;
      --text-secondary:      #4a5568;
      --text-muted:          #8896a8;
      --chip-bg:             rgba(102,126,234,.09);
      --chip-border:         rgba(102,126,234,.2);
      --chip-color:          #4a5568;
      --btn-outline-bg:      rgba(102,126,234,.09);
      --btn-outline-border:  rgba(102,126,234,.22);
      --btn-outline-color:   #4a5568;
      --btn-outline-hover:   rgba(102,126,234,.15);
      --particle-color:      rgba(102,126,234,0.22);
      --particle-color2:     rgba(118,75,162,0.16);
      --footer-link:         #7c6c1a;
      --footer-hover:        #5a4c10;
      --toggle-bg:           rgba(102,126,234,.12);
      --toggle-border:       rgba(102,126,234,.3);
      --toggle-color:        #4a5568;
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { min-height: 100%; background-color: var(--bg-base); overscroll-behavior: none; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-gradient) fixed;
      min-height: 100vh;
      overflow-x: hidden;
      overscroll-behavior: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      transition: background .45s ease, color .45s ease;
    }

    /* ── Theme Toggle (left) ─────────────────────────────────── */
    .theme-toggle {
      position: fixed;
      top: 18px; left: 18px;
      z-index: 1000;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      color: var(--toggle-color);
      font-size: 1.15rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .35s cubic-bezier(.34,1.56,.64,1);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }
    .theme-toggle:hover {
      transform: scale(1.15) rotate(15deg);
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 22px rgba(102,126,234,.5);
    }

    /* ── Background Particles ───────────────────────────────── */
    .bg-animation {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; overflow: hidden; pointer-events: none;
    }
    .bg-animation span {
      position: absolute; display: block;
      border-radius: 50%;
      animation: floatUp 25s linear infinite;
      bottom: -200px;
    }
    .bg-animation span:nth-child(odd)  { background: var(--particle-color); }
    .bg-animation span:nth-child(even) { background: var(--particle-color2); }
    .bg-animation span:nth-child(1)  { left:8%;  width:44px; height:44px; animation-delay:0s;   animation-duration:20s; }
    .bg-animation span:nth-child(2)  { left:22%; width:18px; height:18px; animation-delay:2s;   animation-duration:14s; }
    .bg-animation span:nth-child(3)  { left:50%; width:65px; height:65px; animation-delay:4s;   animation-duration:22s; }
    .bg-animation span:nth-child(4)  { left:68%; width:22px; height:22px; animation-delay:1s;   animation-duration:18s; }
    .bg-animation span:nth-child(5)  { left:83%; width:85px; height:85px; animation-delay:6s;   animation-duration:30s; }
    .bg-animation span:nth-child(6)  { left:33%; width:28px; height:28px; animation-delay:8s;   animation-duration:16s; }
    .bg-animation span:nth-child(7)  { left:58%; width:14px; height:14px; animation-delay:3s;   animation-duration:12s; }
    .bg-animation span:nth-child(8)  { left:13%; width:95px; height:95px; animation-delay:10s;  animation-duration:35s; }
    .bg-animation span:nth-child(9)  { left:88%; width:32px; height:32px; animation-delay:5s;   animation-duration:24s; }
    .bg-animation span:nth-child(10) { left:43%; width:20px; height:20px; animation-delay:12s;  animation-duration:28s; }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);       opacity: 0.12; }
      15%  { opacity: 0.9; }
      85%  { opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Container ──────────────────────────────────────────── */
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 640px;
      text-align: center;
      animation: fadeInDown .7s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card ────────────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid var(--card-border);
      border-radius: 30px;
      padding: 54px 46px;
      box-shadow: var(--card-shadow);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
    }

    /* ── Animated Ghost ─────────────────────────────────────── */
    .ghost-wrap {
      font-size: 4.8rem;
      margin-bottom: 16px;
      animation: float 3.2s ease-in-out infinite;
      display: block;
      line-height: 1;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-16px) rotate(3deg); }
    }

    /* ── Error Code ─────────────────────────────────────────── */
    .error-code {
      font-size: clamp(4.5rem, 14vw, 7.5rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      animation: pulse-code 3s ease-in-out infinite;
    }
    @keyframes pulse-code {
      0%,100% { opacity:1; filter: brightness(1); }
      50%      { opacity:.85; filter: brightness(1.15); }
    }

    h1 {
      font-size: clamp(1.3rem, 4vw, 1.85rem);
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    p.sub {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.75;
      margin-bottom: 32px;
    }

    /* ── Reason Chips ───────────────────────────────────────── */
    .reasons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .reason-chip {
      display: flex; align-items: center; gap: 7px;
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      border-radius: 999px;
      padding: 7px 16px;
      font-size: .8rem;
      color: var(--chip-color);
      font-weight: 500;
      transition: transform .22s ease, background .22s ease;
    }
    .reason-chip:hover { transform: translateY(-2px); background: var(--btn-outline-hover); }
    .reason-chip i { color: #764ba2; }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn-row {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 12px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700; font-size: .9rem;
      text-decoration: none; border: none; cursor: pointer;
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      box-shadow: 0 8px 24px rgba(102,126,234,.42);
    }
    .btn-primary:hover { transform: translateY(-4px); box-shadow: 0 14px 34px rgba(102,126,234,.56); }
    .btn-tg {
      background: linear-gradient(135deg, #26a4da, #1e89b8);
      color: #fff;
      box-shadow: 0 8px 24px rgba(38,164,218,.36);
    }
    .btn-tg:hover { transform: translateY(-4px); box-shadow: 0 14px 34px rgba(38,164,218,.5); }
    .btn-outline {
      background: var(--btn-outline-bg);
      color: var(--btn-outline-color);
      border: 1px solid var(--btn-outline-border);
    }
    .btn-outline:hover { background: var(--btn-outline-hover); color: var(--text-primary); transform: translateY(-2px); }

    /* ── Footer ─────────────────────────────────────────────── */
    .footer-note {
      margin-top: 26px;
      color: var(--text-muted);
      font-size: .83rem;
    }
    .footer-note a { color: var(--footer-link); text-decoration: none; font-weight: 700; transition: color .2s; }
    .footer-note a:hover { color: var(--footer-hover); }

    @media (max-width: 600px) {
      .card { padding: 38px 22px; }
      .btn-row { flex-direction: column; align-items: center; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <!-- Theme Toggle (left side) -->
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
    <i class="fa-solid fa-moon" id="theme-icon"></i>
  </button>

  <div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="container">
    <div class="card">
      <span class="ghost-wrap">👻</span>
      <div class="error-code">404</div>
      <h1>File Not Found</h1>
      <p class="sub">
        Oops! The file you're looking for has vanished into the void.<br>
        It may have been deleted, revoked, or the link is invalid.
      </p>

      <div class="reasons">
        <div class="reason-chip"><i class="fa-solid fa-trash"></i> File was deleted</div>
        <div class="reason-chip"><i class="fa-solid fa-link-slash"></i> Link expired or invalid</div>
        <div class="reason-chip"><i class="fa-solid fa-lock"></i> Access was revoked</div>
        <div class="reason-chip"><i class="fa-solid fa-spell-check"></i> Typo in the URL</div>
      </div>

      <div class="btn-row">
        <a href="/" class="btn btn-primary"><i class="fa-solid fa-house"></i> Home</a>
        <a href="https://t.me/{{ bot_username }}" target="_blank" class="btn btn-tg">
          <i class="fa-brands fa-telegram"></i> Open Bot
        </a>
        <button onclick="history.back()" class="btn btn-outline">
          <i class="fa-solid fa-arrow-left"></i> Go Back
        </button>
      </div>
    </div>

    <div class="footer-note">
      Powered by <a href="https://t.me/{{ bot_username }}">{{ bot_name }}</a> &nbsp;·&nbsp;
      Created with ❤️ by <a href="https://t.me/FLiX_LY" target="_blank">@FLiX_LY</a>
    </div>
  </div>

  <script>
  (function() {
    const saved = localStorage.getItem('flix-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    updateIcon(saved);
  })();

  function updateIcon(theme) {
    const icon = document.getElementById('theme-icon');
    if (!icon) return;
    icon.className = theme === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
  }

  function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('flix-theme', next);
    updateIcon(next);
    const btn = document.querySelector('.theme-toggle');
    btn.style.transform = 'scale(1.2) rotate(360deg)';
    setTimeout(() => { btn.style.transform = ''; }, 400);
  }
  </script>
</body>
</html>
