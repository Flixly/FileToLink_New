<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bandwidth Limit Exceeded | {{ bot_name }}</title>
  <link rel="icon" type="image/jpeg" href="https://i.ibb.co/2YsHg8tf/IMG-3062.jpg">
  <link rel="shortcut icon" type="image/jpeg" href="https://i.ibb.co/2YsHg8tf/IMG-3062.jpg">
  <link rel="apple-touch-icon" href="https://i.ibb.co/2YsHg8tf/IMG-3062.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ── CSS Custom Properties ──────────────────────────────── */
    :root,
    [data-theme="dark"] {
      --bg-base:             #0f0c29;
      --bg-gradient:         linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      --card-bg:             rgba(255,255,255,0.06);
      --card-border:         rgba(255,107,107,.22);
      --card-shadow:         0 24px 64px rgba(0,0,0,.4);
      --text-primary:        #ffffff;
      --text-secondary:      rgba(255,255,255,.55);
      --text-muted:          rgba(255,255,255,.38);
      --warn-icon-bg:        rgba(255,107,107,.13);
      --warn-icon-border:    rgba(255,107,107,.28);
      --warn-icon-color:     #ff6b6b;
      --warn-strong:         #ff6b6b;
      --particle-color:      rgba(255,107,107,0.18);
      --particle-color2:     rgba(238,9,121,0.12);
      --footer-link:         rgba(255,215,0,.8);
      --footer-hover:        #ffd700;
      --toggle-bg:           rgba(255,255,255,.08);
      --toggle-border:       rgba(255,255,255,.18);
      --toggle-color:        rgba(255,255,255,.8);
    }

    [data-theme="light"] {
      --bg-base:             #fdf2f2;
      --bg-gradient:         linear-gradient(135deg, #fde8e8 0%, #f5e6e6 50%, #e8f0e8 100%);
      --card-bg:             rgba(255,255,255,.92);
      --card-border:         rgba(255,107,107,.22);
      --card-shadow:         0 24px 64px rgba(255,107,107,.12);
      --text-primary:        #1a1a2e;
      --text-secondary:      #4a5568;
      --text-muted:          #8896a8;
      --warn-icon-bg:        rgba(255,107,107,.11);
      --warn-icon-border:    rgba(255,107,107,.22);
      --warn-icon-color:     #dc2626;
      --warn-strong:         #dc2626;
      --particle-color:      rgba(255,107,107,0.2);
      --particle-color2:     rgba(238,9,121,0.1);
      --footer-link:         #7c6c1a;
      --footer-hover:        #5a4c10;
      --toggle-bg:           rgba(102,126,234,.12);
      --toggle-border:       rgba(102,126,234,.3);
      --toggle-color:        #4a5568;
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { min-height: 100%; background-color: var(--bg-base); overscroll-behavior: none; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-gradient) fixed;
      min-height: 100vh;
      overflow-x: hidden;
      overscroll-behavior: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      transition: background .45s ease, color .45s ease;
    }

    /* ── Theme Toggle (left) ─────────────────────────────────── */
    .theme-toggle {
      position: fixed;
      top: 18px; left: 18px;
      z-index: 1000;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      color: var(--toggle-color);
      font-size: 1.15rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .35s cubic-bezier(.34,1.56,.64,1);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }
    .theme-toggle:hover {
      transform: scale(1.15) rotate(15deg);
      background: linear-gradient(135deg, #ff6b6b, #ee0979);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 22px rgba(238,9,121,.4);
    }

    /* ── Background Particles ───────────────────────────────── */
    .bg-animation {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; overflow: hidden; pointer-events: none;
    }
    .bg-animation span {
      position: absolute; display: block;
      border-radius: 50%;
      animation: floatUp 25s linear infinite;
      bottom: -200px;
    }
    .bg-animation span:nth-child(odd)  { background: var(--particle-color); }
    .bg-animation span:nth-child(even) { background: var(--particle-color2); }
    .bg-animation span:nth-child(1)  { left:8%;  width:44px; height:44px; animation-delay:0s;   animation-duration:20s; }
    .bg-animation span:nth-child(2)  { left:22%; width:18px; height:18px; animation-delay:2s;   animation-duration:14s; }
    .bg-animation span:nth-child(3)  { left:50%; width:65px; height:65px; animation-delay:4s;   animation-duration:22s; }
    .bg-animation span:nth-child(4)  { left:68%; width:22px; height:22px; animation-delay:1s;   animation-duration:18s; }
    .bg-animation span:nth-child(5)  { left:83%; width:85px; height:85px; animation-delay:6s;   animation-duration:30s; }
    .bg-animation span:nth-child(6)  { left:33%; width:28px; height:28px; animation-delay:8s;   animation-duration:16s; }
    .bg-animation span:nth-child(7)  { left:58%; width:14px; height:14px; animation-delay:3s;   animation-duration:12s; }
    .bg-animation span:nth-child(8)  { left:13%; width:95px; height:95px; animation-delay:10s;  animation-duration:35s; }
    .bg-animation span:nth-child(9)  { left:88%; width:32px; height:32px; animation-delay:5s;   animation-duration:24s; }
    .bg-animation span:nth-child(10) { left:43%; width:20px; height:20px; animation-delay:12s;  animation-duration:28s; }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);       opacity: 0.12; }
      15%  { opacity: 0.9; }
      85%  { opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Container ──────────────────────────────────────────── */
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 580px;
      text-align: center;
      animation: fadeInDown .7s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card ────────────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid var(--card-border);
      border-radius: 30px;
      padding: 54px 46px;
      box-shadow: var(--card-shadow);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 4px;
      background: linear-gradient(90deg, #ff6b6b, #ee0979, #ff6b6b);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Warning Icon ───────────────────────────────────────── */
    .warning-icon {
      width: 84px; height: 84px;
      border-radius: 26px;
      background: var(--warn-icon-bg);
      border: 1px solid var(--warn-icon-border);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
      color: var(--warn-icon-color);
      margin-bottom: 26px;
      animation: pulse-warn 2.2s ease-in-out infinite;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .warning-icon:hover { transform: scale(1.08); }
    @keyframes pulse-warn {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,.35); }
      50%      { box-shadow: 0 0 0 14px rgba(255,107,107,0); }
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 1.95rem);
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    p.sub {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.78;
      margin-bottom: 36px;
    }
    p.sub strong { color: var(--warn-strong); font-weight: 700; }

    /* ── Button ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 14px 36px; border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700; font-size: .92rem;
      text-decoration: none; border: none; cursor: pointer;
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
      background: linear-gradient(135deg, #ff6b6b, #ee0979);
      color: #fff;
      box-shadow: 0 8px 28px rgba(238,9,121,.38);
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.1), transparent 60%);
      pointer-events: none;
    }
    .btn:hover { transform: translateY(-4px); box-shadow: 0 14px 38px rgba(238,9,121,.54); }

    /* ── Footer ─────────────────────────────────────────────── */
    .footer-note {
      margin-top: 26px;
      color: var(--text-muted);
      font-size: .83rem;
    }
    .footer-note a { color: var(--footer-link); text-decoration: none; font-weight: 700; transition: color .2s; }
    .footer-note a:hover { color: var(--footer-hover); }

    @media (max-width: 600px) {
      .card { padding: 38px 22px; }
    }
  </style>
</head>
<body>
  <!-- Theme Toggle (left side) -->
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
    <i class="fa-solid fa-moon" id="theme-icon"></i>
  </button>

  <div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="container">
    <div class="card">
      <div class="warning-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <h1>Bandwidth Limit Exceeded</h1>
      <p class="sub">
        The bot has reached its <strong>bandwidth limit</strong> for this period.<br>
        Please contact the administrator or try again later.
      </p>
      <a href="https://t.me/{{ owner_username }}" target="_blank" class="btn">
        <i class="fa-solid fa-user"></i> Contact Owner
      </a>
    </div>

    <div class="footer-note">
      Powered by <a href="https://t.me/{{ bot_username }}">{{ bot_name }}</a> &nbsp;·&nbsp;
      Created with ❤️ by <a href="https://t.me/FLiX_LY" target="_blank">@FLiX_LY</a>
    </div>
  </div>

  <script>
  (function() {
    const saved = localStorage.getItem('flix-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    updateIcon(saved);
  })();

  function updateIcon(theme) {
    const icon = document.getElementById('theme-icon');
    if (!icon) return;
    icon.className = theme === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
  }

  function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('flix-theme', next);
    updateIcon(next);
    const btn = document.querySelector('.theme-toggle');
    btn.style.transform = 'scale(1.2) rotate(360deg)';
    setTimeout(() => { btn.style.transform = ''; }, 400);
  }
  </script>
</body>
</html>
